<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Incident Control Panel</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --critical: #dc2626;
            --info: #06b6d4;
            --font-display: 'Outfit', sans-serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1280px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 2.25rem;
            background: linear-gradient(to right, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        h1 span {
            font-size: 2.5rem;
        }

        .refresh-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 0.6rem 1.2rem;
            border-radius: 9999px;
            font-family: var(--font-display);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow-lg);
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        main {
            width: 100%;
            max-width: 1280px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
        }

        @media (max-width: 968px) {
            main {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Form elements */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        input[type="text"], input[type="number"] {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 1rem;
            width: 100%;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .coordinate-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .location-btn {
            background: rgba(99, 102, 241, 0.1);
            color: #a5b4fc;
            border: 1px dashed rgba(99, 102, 241, 0.4);
            border-radius: 10px;
            padding: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
        }

        .location-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            color: var(--text-primary);
        }

        .file-upload-wrapper {
            position: relative;
            border: 2px dashed var(--glass-border);
            border-radius: 15px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            background: rgba(15, 23, 42, 0.3);
        }

        .file-upload-wrapper:hover {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-secondary);
        }

        .file-upload-label svg {
            width: 40px;
            height: 40px;
            stroke: var(--text-secondary);
        }

        .preview-container {
            display: none;
            position: relative;
            width: 100%;
            max-height: 200px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .preview-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-remove {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-hover) 100%);
            border: none;
            color: white;
            padding: 1rem;
            border-radius: 10px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(99, 102, 241, 0.6);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Incident List Styles */
        .incidents-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            max-height: 680px;
            padding-right: 0.25rem;
        }

        .incidents-container::-webkit-scrollbar {
            width: 6px;
        }

        .incidents-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .incident-card {
            background: rgba(30, 41, 59, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            cursor: pointer;
        }

        .incident-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(30, 41, 59, 0.4);
            transform: translateX(4px);
        }

        .incident-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .incident-type {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: capitalize;
            color: var(--text-primary);
        }

        .severity-badge {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 0.25rem 0.6rem;
            border-radius: 9999px;
            letter-spacing: 0.05em;
        }

        .severity-badge.low { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .severity-badge.medium { background: rgba(234, 179, 8, 0.2); color: #fbbf24; }
        .severity-badge.high { background: rgba(249, 115, 22, 0.2); color: #fb923c; }
        .severity-badge.critical { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .incident-details {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .incident-score-bar-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
        }

        .score-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            flex-grow: 1;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 9999px;
        }

        .score-fill.low { background: var(--success); }
        .score-fill.medium { background: var(--warning); }
        .score-fill.high { background: var(--danger); }
        .score-fill.critical { background: var(--critical); }

        .score-num {
            font-size: 0.8rem;
            font-weight: 700;
            min-width: 2.5rem;
            text-align: right;
        }

        .no-incidents {
            text-align: center;
            color: var(--text-secondary);
            padding: 3rem 0;
            font-style: italic;
        }

        /* Modal / Detail popup */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .close-modal {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-modal:hover {
            color: var(--text-primary);
        }

        pre {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 1rem;
            color: #a7f3d0;
            font-family: monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            max-height: 250px;
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            border-left: 4px solid var(--accent-primary);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 2000;
            transform: translateY(150%);
            opacity: 0;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }

        /* Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border-left-color: white;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <h1><span>🚨</span> Emergency Incident Dashboard</h1>
        <button class="refresh-btn" id="refreshBtn">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M9 11l3-3 3 3m-3-3v12"/></svg>
            Refresh Feed
        </button>
    </header>

    <main>
        <!-- Incident reporting section -->
        <section class="card">
            <h2 class="card-title">Report New Incident</h2>
            <form id="reportForm">
                <div class="form-group" style="gap: 1rem;">
                    <div class="file-upload-wrapper" id="dropzone">
                        <input type="file" id="imageInput" accept="image/*" required>
                        <div class="file-upload-label" id="uploadLabel">
                            <svg fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 4V20M12 4L8 8M12 4L16 8" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                            <div><strong>Choose image</strong> or drag here</div>
                            <div style="font-size: 0.75rem;">Supports JPG, PNG, WEBP</div>
                        </div>
                        <div class="preview-container" id="previewContainer">
                            <img src="" id="imagePreview" alt="Upload Preview">
                            <button type="button" class="preview-remove" id="removePreviewBtn">&times;</button>
                        </div>
                    </div>
                </div>

                <div class="coordinate-row">
                    <div class="form-group">
                        <label for="latitude">Latitude</label>
                        <input type="number" step="any" id="latitude" required placeholder="e.g. 37.7749">
                    </div>
                    <div class="form-group">
                        <label for="longitude">Longitude</label>
                        <input type="number" step="any" id="longitude" required placeholder="e.g. -122.4194">
                    </div>
                </div>

                <button type="button" class="location-btn" id="gpsBtn">
                    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Get Current GPS coordinates
                </button>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="spinner" id="btnSpinner"></span>
                    <span id="btnText">Submit Report</span>
                </button>
            </form>
        </section>

        <!-- Incidents dashboard section -->
        <section class="card">
            <h2 class="card-title">
                Incident Feed
                <span id="incidentCount" style="font-size: 0.9rem; background: rgba(99, 102, 241, 0.2); color: #a5b4fc; padding: 0.2rem 0.6rem; border-radius: 9999px;">0 Total</span>
            </h2>
            <div class="incidents-container" id="incidentsContainer">
                <div class="no-incidents">Loading live feed...</div>
            </div>
        </section>
    </main>

    <!-- Incident Detail Modal -->
    <div class="modal" id="incidentModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModalBtn">&times;</button>
            <h2 id="modalTitle" style="font-family: var(--font-display); font-size: 1.75rem; text-transform: capitalize;">Incident Details</h2>
            <div id="modalMeta" style="color: var(--text-secondary); font-size: 0.9rem; display: flex; flex-direction: column; gap: 0.25rem;"></div>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;" id="modalTags"></div>
            <div>
                <h3 style="font-family: var(--font-display); margin-bottom: 0.5rem; font-size: 1.1rem;">AI Detection Insights</h3>
                <pre id="modalJson"></pre>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span id="toastMessage">Success</span>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Elements
        const reportForm = document.getElementById('reportForm');
        const imageInput = document.getElementById('imageInput');
        const latitudeInput = document.getElementById('latitude');
        const longitudeInput = document.getElementById('longitude');
        const gpsBtn = document.getElementById('gpsBtn');
        const dropzone = document.getElementById('dropzone');
        const uploadLabel = document.getElementById('uploadLabel');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const removePreviewBtn = document.getElementById('removePreviewBtn');
        const submitBtn = document.getElementById('submitBtn');
        const btnSpinner = document.getElementById('btnSpinner');
        const btnText = document.getElementById('btnText');
        const refreshBtn = document.getElementById('refreshBtn');
        const incidentsContainer = document.getElementById('incidentsContainer');
        const incidentCount = document.getElementById('incidentCount');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // Modal Elements
        const incidentModal = document.getElementById('incidentModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const modalTitle = document.getElementById('modalTitle');
        const modalMeta = document.getElementById('modalMeta');
        const modalTags = document.getElementById('modalTags');
        const modalJson = document.getElementById('modalJson');

        // Toast Helper
        function showToast(message, type = 'success') {
            toastMessage.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // GPS Location Fetcher
        gpsBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                showToast("Geolocation is not supported by your browser", "error");
                return;
            }
            gpsBtn.disabled = true;
            gpsBtn.textContent = "Locating GPS coordinates...";
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    latitudeInput.value = position.coords.latitude.toFixed(6);
                    longitudeInput.value = position.coords.longitude.toFixed(6);
                    gpsBtn.disabled = false;
                    gpsBtn.innerHTML = `
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        GPS coordinates set successfully
                    `;
                    setTimeout(() => {
                        gpsBtn.innerHTML = `
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            Get Current GPS coordinates
                        `;
                    }, 3000);
                },
                (error) => {
                    gpsBtn.disabled = false;
                    gpsBtn.innerHTML = `
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        Get Current GPS coordinates
                    `;
                    showToast(`GPS Error: ${error.message}. Try manually inputting coordinates.`, "error");
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        });

        // Image Selection & Preview
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imagePreview.src = event.target.result;
                    uploadLabel.style.display = 'none';
                    previewContainer.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        removePreviewBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            imageInput.value = '';
            previewContainer.style.display = 'none';
            uploadLabel.style.display = 'flex';
        });

        // Fetch and Populate Incident Feed
        async function fetchIncidents() {
            try {
                const response = await fetch(`${API_BASE}/incidents`);
                const data = await response.json();
                
                if (data.success) {
                    incidentCount.textContent = `${data.count} Total`;
                    
                    if (data.incidents.length === 0) {
                        incidentsContainer.innerHTML = '<div class="no-incidents">No incidents reported yet. Safe and clear!</div>';
                        return;
                    }
                    
                    incidentsContainer.innerHTML = data.incidents.map(inc => {
                        const score = inc.severity_score || 0;
                        let severityClass = 'low';
                        if (score >= 80) severityClass = 'critical';
                        else if (score >= 60) severityClass = 'high';
                        else if (score >= 30) severityClass = 'medium';

                        const formattedDate = new Date(inc.created_at).toLocaleString();

                        return `
                            <div class="incident-card" onclick="openIncidentDetails(${JSON.stringify(inc).replace(/"/g, '&quot;')})">
                                <div class="incident-header">
                                    <div class="incident-type">${inc.incident_type.replace(/_/g, ' ')}</div>
                                    <span class="severity-badge ${severityClass}">${inc.severity}</span>
                                </div>
                                <div class="incident-score-bar-wrapper">
                                    <div class="score-bar">
                                        <div class="score-fill ${severityClass}" style="width: ${score}%"></div>
                                    </div>
                                    <div class="score-num">${score}/100</div>
                                </div>
                                <div class="incident-details">
                                    <span>📍 ${inc.latitude.toFixed(4)}, ${inc.longitude.toFixed(4)}</span>
                                    <span>🕒 ${formattedDate}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    incidentsContainer.innerHTML = '<div class="no-incidents" style="color: var(--danger)">Failed to load incident feed</div>';
                }
            } catch (err) {
                incidentsContainer.innerHTML = `<div class="no-incidents" style="color: var(--danger)">Connection error: ${err.message}</div>`;
            }
        }

        // Open details modal
        window.openIncidentDetails = function(inc) {
            modalTitle.textContent = inc.incident_type.replace(/_/g, ' ') + ' incident';
            
            let severityClass = 'low';
            if (inc.severity_score >= 80) severityClass = 'critical';
            else if (inc.severity_score >= 60) severityClass = 'high';
            else if (inc.severity_score >= 30) severityClass = 'medium';

            const date = new Date(inc.created_at).toLocaleString();

            modalMeta.innerHTML = `
                <div><strong>Incident ID:</strong> #${inc.id}</div>
                <div><strong>Location coordinates:</strong> Latitude ${inc.latitude}, Longitude ${inc.longitude}</div>
                <div><strong>Reported at:</strong> ${date}</div>
                <div><strong>Severity score:</strong> ${inc.severity_score}/100 (${inc.severity.toUpperCase()})</div>
            `;

            // Setup Tags
            let tagsHtml = `<span class="severity-badge ${severityClass}">${inc.severity}</span>`;
            if (inc.raw_response && inc.raw_response.keywords) {
                tagsHtml += inc.raw_response.keywords.map(kw => `
                    <span class="severity-badge" style="background: rgba(99, 102, 241, 0.15); color: #c7d2fe; text-transform: none;">${kw}</span>
                `).join('');
            }
            modalTags.innerHTML = tagsHtml;

            // Format raw JSON
            modalJson.textContent = JSON.stringify(inc.raw_response, null, 2);
            incidentModal.style.display = 'flex';
        };

        // Close Modal
        closeModalBtn.addEventListener('click', () => {
            incidentModal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === incidentModal) {
                incidentModal.style.display = 'none';
            }
        });

        // Form Submit Handler
        reportForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = imageInput.files[0];
            const lat = latitudeInput.value;
            const lng = longitudeInput.value;
            
            if (!file || !lat || !lng) {
                showToast("Please fill all required inputs and select an image", "error");
                return;
            }

            const formData = new FormData();
            formData.append('image', file);
            formData.append('latitude', lat);
            formData.append('longitude', lng);

            // UI loading state
            submitBtn.disabled = true;
            btnSpinner.style.display = 'block';
            btnText.textContent = "Analyzing & Uploading...";

            try {
                const response = await fetch(`${API_BASE}/report`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showToast("Incident reported and saved successfully!");
                    // Reset Form
                    reportForm.reset();
                    previewContainer.style.display = 'none';
                    uploadLabel.style.display = 'flex';
                    // Reload Feed
                    fetchIncidents();
                } else {
                    showToast(data.detail || "Server failed to process incident", "error");
                }
            } catch (err) {
                showToast(`Network Error: ${err.message}`, "error");
            } finally {
                submitBtn.disabled = false;
                btnSpinner.style.display = 'none';
                btnText.textContent = "Submit Report";
            }
        });

        // Refresh click
        refreshBtn.addEventListener('click', () => {
            showToast("Refreshing feed...");
            fetchIncidents();
        });

        // Initial Load
        fetchIncidents();
    </script>
</body>
</html>
